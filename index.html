<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>まぜまぜ</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --bg-color: #fdfdfd;
            --panel-bg: #ffffff;
            --btn-size: 13vw; 
            --btn-max-size: 58px;
        }

        /* 画面全体の固定とスクロール禁止 */
        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            /* 画面全体で長押しメニューを禁止 */
            -webkit-touch-callout: none;
            user-select: none;
            touch-action: none;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh; 
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
            color: #333;
        }

        header { flex-shrink: 0; padding: 10px 0; text-align: center; }
        h1 { font-size: 1.3rem; margin: 0; color: #555; }

        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            width: 100%;
            max-width: 480px;
            flex-grow: 1;
            padding: 5px 10px;
            box-sizing: border-box;
        }

        .row-group { width: 100%; text-align: center; }

        .section-label {
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #aaa;
        }

        /* 選択中の色を表示するエリア */
        .selection-status {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 5px;
            min-height: 1.2em; /* 文字がない時も高さを保つ */
            color: #555;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            background: var(--panel-bg);
            padding: 10px;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }

        .color-btn {
            width: var(--btn-size);
            height: var(--btn-size);
            max-width: var(--btn-max-size);
            max-height: var(--btn-max-size);
            border-radius: 50%;
            border: 3px solid #f0f0f0;
            box-sizing: border-box;
            /* 子供がボタンを長押ししてもシングルタップとして扱うためのCSS */
            -webkit-touch-callout: none;
            touch-action: none;
            user-select: none;
        }

        .color-btn.active {
            border-color: #555;
            transform: scale(1.1);
            box-shadow: 0 5px 12px rgba(0,0,0,0.15);
        }

        .symbol { font-size: 1.4rem; color: #ddd; margin: 2px 0; font-weight: bold; }

        .result-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            background: var(--panel-bg);
            border-radius: 24px;
            width: 85%;
            max-width: 300px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.07);
        }

        .result-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #fafafa;
            border: 6px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: background-color 0.4s ease;
        }

        .instruction { margin-top: 10px; font-size: 1rem; color: #444; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <header><h1>なにいろに なるかな？</h1></header>

    <div class="app-container">
        <div class="row-group">
            <div class="selection-status" id="status-a">いろを えらんでね！</div>
            <div class="color-grid" id="grid-a"></div>
        </div>

        <div class="symbol">＋</div>

        <div class="row-group">
            <div class="selection-status" id="status-b">いろを えらんでね！</div>
            <div class="color-grid" id="grid-b"></div>
        </div>

        <div class="symbol">＝</div>

        <div class="result-box">
            <div class="result-circle" id="result-display"></div>
            <div class="instruction" id="msg">いろを えらんでね！</div>
        </div>
    </div>

    <script>
        // --- 1. 基本色の定義 (灰色をねずみに、紫色を廃止し赤紫/青紫を追加、名前から「いろ」を削除) ---
        const colors = [
            { id: 'red', name: 'あか', code: '#FF0000' }, { id: 'blue', name: 'あお', code: '#0000FF' },
            { id: 'yellow', name: 'きいろ', code: '#FFFF00' }, { id: 'green', name: 'みどり', code: '#008000' },
            { id: 'orange', name: 'オレンジ', code: '#FFA500' }, { id: 'redpurple', name: 'あかむらさき', code: '#C71585' },
            { id: 'bluepurple', name: 'あおむらさき', code: '#6A5ACD' }, { id: 'pink', name: 'ピンク', code: '#FFC0CB' },
            { id: 'skyblue', name: 'みずいろ', code: '#87CEEB' }, { id: 'brown', name: 'ちゃいろ', code: '#8B4513' },
            { id: 'nezumi', name: 'ねずみ', code: '#808080' }, { id: 'black', name: 'くろ', code: '#000000' },
            { id: 'white', name: 'しろ', code: '#FFFFFF' } // 灰色があった場所に追加
        ];

        // --- 2. 完全混色マトリックス (赤紫・青紫・ねずみに対応、名前も調整) ---
        const colorMatrix = {
            // 基本色
            'blue-red': { name: 'むらさき', code: '#800080' }, // 赤+青で紫が復活
            'red-yellow': { name: 'オレンジ', code: '#FFA500' },
            'blue-yellow': { name: 'みどり', code: '#008000' },
            // 新しい色の組み合わせ
            'redpurple-red': { name: 'こいあかむらさき', code: '#B01070' },
            'blue-redpurple': { name: 'あおむらさき', code: '#6A5ACD' },
            'blue-bluepurple': { name: 'こいあおむらさき', code: '#5040B0' },
            'bluepurple-red': { name: 'あかむらさき', code: '#C71585' },
            'redpurple-bluepurple': { name: 'むらさき', code: '#800080' },
            // 白との混色（パステルカラー）
            'red-white': { name: 'ピンク', code: '#FF80AB' },
            'blue-white': { name: 'みずいろ', code: '#87CEEB' },
            'white-yellow': { name: 'クリーム', code: '#FFFFE0' },
            'green-white': { name: 'うすいみどり', code: '#98FB98' },
            'orange-white': { name: 'うすいオレンジ', code: '#FFDAB9' },
            'purple-white': { name: 'うすむらさき', code: '#E6E6FA' }, // 紫+白
            'redpurple-white': { name: 'うすいあかむらさき', code: '#E0A0D0' },
            'bluepurple-white': { name: 'うすいあおむらさき', code: '#C0D0F0' },
            'pink-white': { name: 'うすいピンク', code: '#FFF0F5' },
            'skyblue-white': { name: 'うすいみずいろ', code: '#F0FFFF' },
            'brown-white': { name: 'うすいちゃいろ', code: '#D2B48C' },
            'black-white': { name: 'ねずみ', code: '#808080' }, // 黒+白
            'nezumi-white': { name: 'うすいねずみ', code: '#B0B0B0' },
            // 黒との混色（ダークカラー）
            'black-red': { name: 'くらいあか', code: '#800000' },
            'black-blue': { name: 'こん', code: '#000050' },
            'black-yellow': { name: 'オリーブ', code: '#808000' },
            'black-brown': { name: 'こげちゃ', code: '#3E2723' },
            'black-nezumi': { name: 'こいねずみ', code: '#404040' },
            // ねずみいろ（灰色）との混色
            'green-nezumi': { name: 'くすんだみどり', code: '#608060' },
            'nezumi-red': { name: 'くすんだあか', code: '#A06060' },
            'blue-nezumi': { name: 'くすんだあお', code: '#6060A0' },
            // 赤ベース
            'green-red': { name: 'ちゃ', code: '#8B4513' },
            'brown-red': { name: 'あかちゃ', code: '#A52A2A' },
            // 青ベース
            'blue-green': { name: 'あおみどり', code: '#00CED1' },
            // 黄色ベース
            'orange-yellow': { name: 'やまぶき', code: '#FFD700' },
            'skyblue-yellow': { name: 'うすいみどり', code: '#98FB98' },
            // ... (その他省略。もし「？」が出る組み合わせがあれば、ここに足す必要があります)
        };

        let selA = null, selB = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(160, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(450, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function init() {
            const gA = document.getElementById('grid-a'), gB = document.getElementById('grid-b');
            colors.forEach(c => {
                gA.appendChild(createBtn(c, 'A'));
                gB.appendChild(createBtn(c, 'B'));
            });
        }

        function createBtn(c, type) {
            const btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.backgroundColor = c.code;
            if(c.id === 'white') btn.style.border = '3px solid #ddd';

            // 子供の長押し対策：onclickイベントを使用して、長押しでもタップでも1つのシングルタップとして即座に処理する
            btn.onclick = () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playSound();
                if (type === 'A') {
                    selA = c.id;
                    updateActive('grid-a', btn);
                    document.getElementById('status-a').textContent = '１つめのいろ：' + c.name; // 名前を表示
                } else {
                    selB = c.id;
                    updateActive('grid-b', btn);
                    document.getElementById('status-b').textContent = '２つめのいろ：' + c.name; // 名前を表示
                }
                updateResult();
            };
            return btn;
        }

        function updateActive(id, btn) {
            document.querySelectorAll(`#${id} .color-btn`).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function updateResult() {
            if (!selA || !selB) return;
            const res = document.getElementById('result-display'), msg = document.getElementById('msg');
            
            let colorData;
            if (selA === selB) {
                const sameColor = colors.find(c => c.id === selA);
                colorData = { name: sameColor.name, code: sameColor.code };
            } else {
                const key = [selA, selB].sort().join('-');
                colorData = colorMatrix[key] || { name: 'ふしぎな', code: '#999' };
            }
            
            res.style.backgroundColor = colorData.code;
            res.style.borderColor = (colorData.code.toUpperCase() === '#FFFFFF') ? '#eee' : '#fff';
            
            // 「〇〇いろが できた！」と表示 (名前から「いろ」を消したので、しろいろいろにならない)
            msg.textContent = colorData.name + 'いろが できた！';
        }

        init();
        
        // --- 画面全体の長押し対策：長押しメニューを出さず、スクロールも禁止 ---
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
