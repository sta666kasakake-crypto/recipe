<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>まぜまぜ</title>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --panel-bg: #ffffff;
            --btn-size: 13vw; 
            --btn-max-size: 58px;
        }

        /* 画面全体のスクロールやバウンス（跳ね返り）を物理的に禁止する */
        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            /* 画面端を触ってもブラウザのツールバーを反応させにくくする */
            touch-action: none; 
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh; 
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        header { flex-shrink: 0; padding: 10px 0; text-align: center; }
        h1 { font-size: 1.3rem; margin: 0; color: #555; }

        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            width: 100%;
            max-width: 480px;
            flex-grow: 1;
            padding: 5px 10px;
            box-sizing: border-box;
        }

        .section-label {
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #aaa;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            background: var(--panel-bg);
            padding: 10px;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }

        .color-btn {
            width: var(--btn-size);
            height: var(--btn-size);
            max-width: var(--btn-max-size);
            max-height: var(--btn-max-size);
            border-radius: 50%;
            border: 3px solid #f0f0f0;
            box-sizing: border-box;
        }

        .color-btn.active {
            border-color: #555;
            transform: scale(1.1);
            box-shadow: 0 5px 12px rgba(0,0,0,0.15);
        }

        .symbol { font-size: 1.4rem; color: #ddd; margin: 2px 0; font-weight: bold; }

        .result-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            background: var(--panel-bg);
            border-radius: 24px;
            width: 85%;
            max-width: 300px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.07);
        }

        .result-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #fafafa;
            border: 6px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .instruction { margin-top: 10px; font-size: 1rem; color: #444; font-weight: bold; }
    </style>
</head>
<body>

    <header><h1>なにいろに なるかな？</h1></header>

    <div class="app-container">
        <div class="row-group">
            <div class="section-label" style="text-align:center;">１つめの いろ</div>
            <div class="color-grid" id="grid-a"></div>
        </div>
        <div class="symbol">＋</div>
        <div class="row-group">
            <div class="section-label" style="text-align:center;">２つめの いろ</div>
            <div class="color-grid" id="grid-b"></div>
        </div>
        <div class="symbol">＝</div>
        <div class="result-box">
            <div class="result-circle" id="result-display"></div>
            <div class="instruction" id="msg">いろを えらんでね！</div>
        </div>
    </div>

    <script>
        // (ロジックはV6と同じものを適用してください)
        const colors = [
            { id: 'red', name: 'あか', code: '#FF0000' }, { id: 'blue', name: 'あお', code: '#0000FF' },
            { id: 'yellow', name: 'きいろ', code: '#FFFF00' }, { id: 'green', name: 'みどり', code: '#008000' },
            { id: 'orange', name: 'オレンジ', code: '#FFA500' }, { id: 'purple', name: 'むらさき', code: '#800080' },
            { id: 'pink', name: 'ピンク', code: '#FFC0CB' }, { id: 'skyblue', name: 'みずいろ', code: '#87CEEB' },
            { id: 'yellowgreen', name: 'きみどり', code: '#9ACD32' }, { id: 'brown', name: 'ちゃいろ', code: '#8B4513' },
            { id: 'white', name: 'しろ', code: '#FFFFFF' }, { id: 'black', name: 'くろ', code: '#000000' }
        ];
        const colorMatrix = {
            'blue-red': { name: 'むらさき', code: '#800080' }, 'red-yellow': { name: 'オレンジ', code: '#FFA500' }, 'blue-yellow': { name: 'みどり', code: '#008000' },
            'red-white': { name: 'ピンク', code: '#FF80AB' }, 'blue-white': { name: 'みずいろ', code: '#87CEEB' }, 'white-yellow': { name: 'クリーム', code: '#FFFFE0' },
            'green-white': { name: 'うすいみどり', code: '#98FB98' }, 'orange-white': { name: 'うすいオレンジ', code: '#FFDAB9' }, 'purple-white': { name: 'うすむらさき', code: '#E6E6FA' },
            'pink-white': { name: 'うすいピンク', code: '#FFF0F5' }, 'skyblue-white': { name: 'うすいみずいろ', code: '#F0FFFF' }, 'white-yellowgreen': { name: 'うすいきみどり', code: '#EAFFD0' },
            'brown-white': { name: 'うすいちゃいろ', code: '#D2B48C' }, 'black-white': { name: 'はいいろ', code: '#808080' }, 'black-red': { name: 'くらいあか', code: '#800000' },
            'black-blue': { name: 'こんいろ', code: '#000050' }, 'black-yellow': { name: 'オリーブ', code: '#808000' }, 'black-green': { name: 'ふかみどり', code: '#004000' },
            'black-orange': { name: 'こげちゃ', code: '#8B4500' }, 'black-purple': { name: 'くらいむらさき', code: '#2E0854' }, 'black-pink': { name: 'こいピンク', code: '#C71585' },
            'black-skyblue': { name: 'くらいみずいろ', code: '#4682B4' }, 'black-yellowgreen': { name: 'こいみどり', code: '#556B2F' }, 'black-brown': { name: 'こげちゃ', code: '#3E2723' },
            'green-red': { name: 'ちゃいろ', code: '#8B4513' }, 'orange-red': { name: 'しゅいろ', code: '#FF4500' }, 'purple-red': { name: 'あかむらさき', code: '#C71585' },
            'pink-red': { name: 'こいピンク', code: '#FF1493' }, 'red-skyblue': { name: 'くすんだむらさき', code: '#9370DB' }, 'red-yellowgreen': { name: 'ちゃいろ', code: '#CD853F' },
            'brown-red': { name: 'あかちゃいろ', code: '#A52A2A' }, 'blue-green': { name: 'あおみどり', code: '#00CED1' }, 'blue-orange': { name: 'ちゃいろ', code: '#8B4513' },
            'blue-purple': { name: 'こんいろ', code: '#4B0082' }, 'blue-pink': { name: 'あかるいむらさき', code: '#DA70D6' }, 'blue-skyblue': { name: 'こいみずいろ', code: '#1E90FF' },
            'blue-yellowgreen': { name: 'ふかみどり', code: '#228B22' }, 'blue-brown': { name: 'こげちゃ', code: '#5D4037' }, 'green-yellow': { name: 'きみどり', code: '#ADFF2F' },
            'orange-yellow': { name: 'やまぶきいろ', code: '#FFD700' }, 'purple-yellow': { name: 'ちゃいろ', code: '#8B4513' }, 'pink-yellow': { name: 'うすだいだい', code: '#FFDAB9' },
            'skyblue-yellow': { name: 'うすいみどり', code: '#98FB98' }, 'yellow-yellowgreen': { name: 'きみどり', code: '#DFFF00' }, 'yellow-brown': { name: 'おうどいろ', code: '#DAA520' },
            'green-orange': { name: 'うすいちゃいろ', code: '#B8860B' }, 'green-purple': { name: 'くすんだむらさき', code: '#483D8B' }, 'green-pink': { name: 'くすんだピンク', code: '#BC8F8F' },
            'green-skyblue': { name: 'エメラルド', code: '#40E0D0' }, 'green-yellowgreen': { name: 'きみどり', code: '#32CD32' }, 'brown-green': { name: 'ふかみどり', code: '#556B2F' },
            'orange-purple': { name: 'ちゃいろ', code: '#A0522D' }, 'orange-pink': { name: 'サーモンピンク', code: '#FA8072' }, 'orange-skyblue': { name: 'うすちゃいろ', code: '#F4A460' },
            'orange-yellowgreen': { name: 'おうどいろ', code: '#DAA520' }, 'brown-orange': { name: 'あかちゃいろ', code: '#A0522D' }, 'pink-purple': { name: 'あかるいむらさき', code: '#DA70D6' },
            'purple-skyblue': { name: 'あおむらさき', code: '#6A5ACD' }, 'purple-yellowgreen': { name: 'オリーブ', code: '#6B8E23' }, 'brown-purple': { name: 'こげちゃ', code: '#4E342E' },
            'pink-skyblue': { name: 'うすむらさき', code: '#E6E6FA' }, 'pink-yellowgreen': { name: 'おうどいろ', code: '#FFD700' }, 'brown-pink': { name: 'くすんだピンク', code: '#BC8F8F' },
            'skyblue-yellowgreen': { name: 'あかるいみどり', code: '#AFEEEE' }, 'brown-skyblue': { name: 'ねずみいろ', code: '#708090' }, 'brown-yellowgreen': { name: 'ふかみどり', code: '#6B8E23' }
        };

        let selA = null, selB = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(160, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(450, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
        function init() {
            const gA = document.getElementById('grid-a'), gB = document.getElementById('grid-b');
            colors.forEach(c => {
                gA.appendChild(createBtn(c, 'A'));
                gB.appendChild(createBtn(c, 'B'));
            });
        }
        function createBtn(c, type) {
            const btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.backgroundColor = c.code;
            if(c.id === 'white') btn.style.border = '3px solid #ddd';
            btn.onclick = () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playSound();
                if (type === 'A') { selA = c.id; updateActive('grid-a', btn); }
                else { selB = c.id; updateActive('grid-b', btn); }
                updateResult();
            };
            return btn;
        }
        function updateActive(id, btn) {
            document.querySelectorAll(`#${id} .color-btn`).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function updateResult() {
            if (!selA || !selB) return;
            const res = document.getElementById('result-display'), msg = document.getElementById('msg');
            let colorData;
            if (selA === selB) {
                const sameColor = colors.find(c => c.id === selA);
                colorData = { name: sameColor.name, code: sameColor.code };
            } else {
                const key = [selA, selB].sort().join('-');
                colorData = colorMatrix[key] || { name: 'ふしぎな', code: '#999' };
            }
            res.style.backgroundColor = colorData.code;
            res.style.borderColor = (colorData.code.toUpperCase() === '#FFFFFF') ? '#eee' : '#fff';
            msg.textContent = colorData.name + 'いろが できた！';
        }
        init();
        
        // --- 画面が動くのを完全に防ぐスクリプト ---
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
