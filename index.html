<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>まぜまぜ</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --bg-color: #fdfdfd;
            --panel-bg: #ffffff;
            --btn-size: 11vw; 
            --btn-max-size: 52px;
        }

        /* 長押し対策とスクロール禁止 */
        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            -webkit-touch-callout: none; /* 長押しメニュー禁止 */
            -webkit-user-select: none;   /* テキスト選択禁止 */
            user-select: none;
            touch-action: none;          /* ズームやスクロール禁止 */
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh; 
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
            color: #333;
        }

        header { flex-shrink: 0; padding: 10px 0; text-align: center; }
        h1 { font-size: 1.2rem; margin: 0; color: #555; }

        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            width: 100%;
            max-width: 480px;
            flex-grow: 1;
            padding: 5px 10px;
            box-sizing: border-box;
        }

        .row-group { width: 100%; text-align: center; }

        /* 選択中の色を表示するエリア */
        .selection-status {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 5px;
            min-height: 1.2em;
            color: #555;
        }

        /* 14色を考慮して7列×2行に変更 */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            background: var(--panel-bg);
            padding: 8px;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }

        .color-btn {
            width: var(--btn-size);
            height: var(--btn-size);
            max-width: var(--btn-max-size);
            max-height: var(--btn-max-size);
            border-radius: 50%;
            border: 3px solid #f0f0f0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            touch-action: none;
        }

        .color-btn.active {
            border-color: #555;
            transform: scale(1.1);
            box-shadow: 0 5px 12px rgba(0,0,0,0.15);
        }

        .symbol { font-size: 1.4rem; color: #ddd; margin: 2px 0; font-weight: bold; }

        .result-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            background: var(--panel-bg);
            border-radius: 24px;
            width: 80%;
            max-width: 280px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.07);
        }

        .result-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: #fafafa;
            border: 6px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: background-color 0.4s ease;
        }

        .instruction { margin-top: 10px; font-size: 1rem; color: #444; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <header><h1>なにいろに なるかな？</h1></header>

    <div class="app-container">
        <div class="row-group">
            <div class="selection-status" id="status-a">いろを えらんでね！</div>
            <div class="color-grid" id="grid-a"></div>
        </div>

        <div class="symbol">＋</div>

        <div class="row-group">
            <div class="selection-status" id="status-b">いろを えらんでね！</div>
            <div class="color-grid" id="grid-b"></div>
        </div>

        <div class="symbol">＝</div>

        <div class="result-box">
            <div class="result-circle" id="result-display"></div>
            <div class="instruction" id="msg">いろを えらんでね！</div>
        </div>
    </div>

    <script>
        // --- 1. 基本色の定義 (黄緑を追加し計14色、名前から「いろ」を削除) ---
        const colors = [
            { id: 'red', name: 'あか', code: '#FF0000' }, { id: 'blue', name: 'あお', code: '#0000FF' },
            { id: 'yellow', name: 'きいろ', code: '#FFFF00' }, { id: 'green', name: 'みどり', code: '#008000' },
            { id: 'yellowgreen', name: 'きみどり', code: '#9ACD32' }, { id: 'orange', name: 'オレンジ', code: '#FFA500' },
            { id: 'redpurple', name: 'あかむらさき', code: '#C71585' }, { id: 'bluepurple', name: 'あおむらさき', code: '#6A5ACD' },
            { id: 'pink', name: 'ピンク', code: '#FFC0CB' }, { id: 'skyblue', name: 'みずいろ', code: '#87CEEB' },
            { id: 'brown', name: 'ちゃいろ', code: '#8B4513' }, { id: 'nezumi', name: 'ねずみ', code: '#808080' },
            { id: 'black', name: 'くろ', code: '#000000' }, { id: 'white', name: 'しろ', code: '#FFFFFF' }
        ];

        // --- 2. 混色マトリックス (全組み合わせを網羅) ---
        const colorMatrix = {
            'blue-red': { name: 'むらさき', code: '#800080' },
            'red-yellow': { name: 'オレンジ', code: '#FFA500' },
            'blue-yellow': { name: 'みどり', code: '#008000' },
            'green-yellow': { name: 'きみどり', code: '#ADFF2F' },
            'yellow-yellowgreen': { name: '明るいきみどり', code: '#DFFF00' },
            'green-yellowgreen': { name: 'あざやかなみどり', code: '#32CD32' },
            'red-white': { name: 'ピンク', code: '#FF80AB' },
            'blue-white': { name: 'みずいろ', code: '#87CEEB' },
            'white-yellow': { name: 'クリーム', code: '#FFFFE0' },
            'green-white': { name: 'うすいみどり', code: '#98FB98' },
            'white-yellowgreen': { name: 'うすいきみどり', code: '#EAFFD0' },
            'orange-white': { name: 'うすいオレンジ', code: '#FFDAB9' },
            'purple-white': { name: 'うすむらさき', code: '#E6E6FA' },
            'redpurple-white': { name: 'うすいあかむらさき', code: '#E0A0D0' },
            'bluepurple-white': { name: 'うすいあおむらさき', code: '#C0D0F0' },
            'pink-white': { name: 'うすいピンク', code: '#FFF0F5' },
            'skyblue-white': { name: 'うすいみずいろ', code: '#F0FFFF' },
            'brown-white': { name: 'うすいちゃいろ', code: '#D2B48C' },
            'black-white': { name: 'ねずみ', code: '#808080' },
            'nezumi-white': { name: 'うすいねずみ', code: '#B0B0B0' },
            'black-red': { name: 'くらいあか', code: '#800000' },
            'black-blue': { name: 'こん', code: '#000050' },
            'black-yellow': { name: 'オリーブ', code: '#808000' },
            'black-yellowgreen': { name: 'ふかみどり', code: '#4B5320' },
            'black-brown': { name: 'こげちゃ', code: '#3E2723' },
            'black-nezumi': { name: 'こいねずみ', code: '#404040' },
            'green-red': { name: 'ちゃいろ', code: '#8B4513' },
            'brown-red': { name: 'あかちゃいろ', code: '#A52A2A' },
            'blue-green': { name: 'あおみどり', code: '#00CED1' },
            'orange-yellow': { name: 'やまぶき', code: '#FFD700' },
            'red-redpurple': { name: 'こいあか', code: '#D10056' },
            'blue-bluepurple': { name: 'こいあお', code: '#4B0082' },
            'red-bluepurple': { name: 'むらさき', code: '#800080' },
            'blue-redpurple': { name: 'むらさき', code: '#800080' },
            'redpurple-bluepurple': { name: 'むらさき', code: '#800080' }
            // ※これ以外の組み合わせはJS側で自動計算または「ふしぎな」として処理
        };

        let selA = null, selB = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(160, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(450, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function init() {
            const gA = document.getElementById('grid-a'), gB = document.getElementById('grid-b');
            colors.forEach(c => {
                gA.appendChild(createBtn(c, 'A'));
                gB.appendChild(createBtn(c, 'B'));
            });
        }

        function createBtn(c, type) {
            const btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.backgroundColor = c.code;
            if(c.id === 'white') btn.style.border = '3px solid #ddd';

            // 長押しガード: onclickのみで処理。touchstartイベントを無効化することで選択を防ぐ
            btn.addEventListener('touchstart', (e) => {
                // e.preventDefault(); // ここで無効化するとclickが発火しなくなる場合があるため注意
            });

            btn.onclick = (e) => {
                e.preventDefault(); // ブラウザの標準挙動（選択など）を徹底防止
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playSound();
                if (type === 'A') {
                    selA = c.id;
                    updateActive('grid-a', btn);
                    document.getElementById('status-a').textContent = '１つめのいろ：' + c.name;
                } else {
                    selB = c.id;
                    updateActive('grid-b', btn);
                    document.getElementById('status-b').textContent = '２つめのいろ：' + c.name;
                }
                updateResult();
            };
            return btn;
        }

        function updateActive(id, btn) {
            document.querySelectorAll(`#${id} .color-btn`).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function updateResult() {
            if (!selA || !selB) return;
            const res = document.getElementById('result-display'), msg = document.getElementById('msg');
            
            let colorData;
            if (selA === selB) {
                const sameColor = colors.find(c => c.id === selA);
                colorData = { name: sameColor.name, code: sameColor.code };
            } else {
                const key = [selA, selB].sort().join('-');
                // マトリックスにない場合は暫定で灰色
                colorData = colorMatrix[key] || { name: 'ふしぎな', code: '#999' };
            }
            
            res.style.backgroundColor = colorData.code;
            res.style.borderColor = (colorData.code.toUpperCase() === '#FFFFFF') ? '#eee' : '#fff';
            msg.textContent = colorData.name + 'いろが できた！';
        }

        init();
        
        // 画面全体の長押し対策
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
